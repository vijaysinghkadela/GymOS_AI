name: gymos_ai
description: "GymOS — AI-powered gym management SaaS platform"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Typography & Design
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
